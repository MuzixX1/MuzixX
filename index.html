<!DOCTYPE html>
<html>
<head>
    <title>Muzix X - Music Sharing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding-top: 50px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #BB86FC; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h2>Opening in MuzixX...</h2>
    <div class="loader"></div>
    <p>If the app doesn't open automatically, <a id="download-link" href="#" style="color: #BB86FC;">click here to download MuzixX</a>.</p>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const songId = urlParams.get('id') || '';
        const title = urlParams.get('title') || '';
        const artist = urlParams.get('artist') || '';
        const apkDownloadUrl = "https://github.com/Sumit282698/MuzixX/releases";

        document.getElementById('download-link').href = apkDownloadUrl;
        const appDeepLink = `muzixx://share?id=${songId}&title=${encodeURIComponent(title)}&artist=${encodeURIComponent(artist)}`;

        window.location.href = appDeepLink;
        setTimeout(function() {
            if (!document.hidden) {
                window.location.href = apkDownloadUrl;
            }
        }, 2500);
    </script>
</body>
</html>
